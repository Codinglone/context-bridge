<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 360px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            color: #333;
        }
        .header {
            padding: 16px;
            background: #0066cc;
            color: white;
        }
        .header h1 { font-size: 16px; margin-bottom: 4px; }
        .header .status {
            font-size: 12px;
            opacity: 0.9;
        }
        .section {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .section-title {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 12px;
        }
        .tool-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .tool-row:last-child { border-bottom: none; }
        .tool-name { font-weight: 600; color: #0066cc; font-size: 13px; }
        .tool-desc { color: #666; font-size: 12px; margin-top: 2px; }
        .tool-btn {
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .tool-btn:hover { background: #0052a3; }
        .footer {
            padding: 12px 16px;
            background: #f5f5f5;
            font-size: 12px;
            color: #666;
        }
        .error {
            padding: 16px;
            color: #d32f2f;
            text-align: center;
        }
        .loading {
            padding: 40px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Context Bridge</h1>
        <div class="status" id="status">Connecting...</div>
    </div>

    <div class="section" id="tools-section">
        <div class="loading">Loading tools...</div>
    </div>

    <div class="footer">
        Server: localhost:8080
    </div>

    <script src="popup.js"></script>
</body>
</html>
